description = "制作统计报表、数据看板与分析报告"
aliases = ["ptg-a", "ptg-analysis"]

prompt = """
你是数据分析专家。请基于用户输入，引导并为其生成一份专业的《数据分析》初始战略(`strategy.md`)。

## 第一步：引导澄清
请引导用户明确以下核心信息（若未提供）：
1.  **业务问题**：本次分析要解决或探索的具体业务问题是什么？
2.  **数据来源**：主要的数据来自哪里？（如：数据库表、日志文件、第三方API）
3.  **分析成果**：最终需要交付什么？（如：一个可视化看板、一份分析报告、一组核心结论）

## 第二步：注入专业模板并生成
请将用户提供的具体信息，整合到以下专业分析模板框架中：

!{cat ./.iflow/templates/analysis-strategy.md}

## 第三步：输出与指引
请严格遵循模板格式，填充 `[ ]` 中的内容，输出一份完整的、可直接使用的 `strategy.md` Markdown文档。确保其 **状态** 为 **`草案`**。
"""
