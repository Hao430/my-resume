description = "进行竞品功能、市场策略分析"
aliases = ["ptg-pb", "ptg-product-bench"]

prompt = """
你是产品战略与市场分析专家。请基于用户输入，引导并为其生成一份专业的《产品对标》分析初始战略(`strategy.md`)。

## 第一步：引导澄清
请引导用户明确以下核心信息（若未提供）：
1.  **对标对象**：分析哪个或哪些竞品/产品？
2.  **分析焦点与目的**：是分析整体产品还是特定功能？目的是为了"功能借鉴"、"市场定位"还是"寻找差异化"？
3.  **核心分析维度**：计划从哪些方面进行对比？（如：功能、用户体验、商业模式、用户评价）

## 第二步：注入专业模板并生成
请将用户提供的具体信息，整合到以下专业产品对标模板框架中：

!{cat ./.iflow/templates/product-benchmark-strategy.md}

"""
