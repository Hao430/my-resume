name: Auto Deploy

on:
  push:
    branches: [main]
  # 监听 public/每日早参/ 目录变化，每小时自动检查并部署最新文件
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync daily briefs
        run: npm run sync-daily-briefs

      - name: Build
        run: npm run build

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: sync daily briefs [auto]"
          git push
