name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  actions: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ============================================
  # Job 1: 代码质量检查
  # ============================================
  quality-check:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: Lint 检查
        run: pnpm run lint

      - name: TypeScript 类型检查
        run: pnpm run type-check

      - name: 安装后端依赖
        run: cd server && npm ci

      - name: 后端 TypeScript 编译检查
        run: cd server && npx tsc --noEmit

  # ============================================
  # Job 2: 前端构建测试
  # ============================================
  build-frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 生产构建
        run: pnpm run build-only

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ============================================
  # Job 3: 后端部署到云服务器
  # ============================================
  deploy-backend:
    name: 部署后端
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 编译后端
        run: |
          cd server
          npm ci
          npm run build

      - name: 同步文件到服务器
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: 8.156.68.107
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "server/"
          TARGET: /www/wwwroot/hao430/server
          ARGS: -avzr --delete --exclude='node_modules' --exclude='.env'
          SCRIPT_AFTER: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            mkdir -p /www/wwwroot/hao430/logs
            cd /www/wwwroot/hao430/server
            npm ci --omit=dev
            pm2 restart ecosystem.config.cjs --env production || pm2 start ecosystem.config.cjs --env production
            pm2 save

  # ============================================
  # Job 4: 前端部署到阿里云 ESA
  # ============================================
  deploy-frontend:
    name: 部署前端
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://hao430.cn

    steps:
      - uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 生产构建
        run: pnpm run build-only

      - name: 部署到阿里云 ESA
        run: |
          echo "🚀 前端构建完毕，等待 ESA 自动部署..."
          echo "📦 构建产物: ./dist"
          echo "🌐 域名: https://hao430.cn"
          echo ""
          echo "✅ ESA 已配置 GitHub 自动监听，推送 main 分支即触发部署"
          echo "   配置参考: esa.jsonc"

  # ============================================
  # Job 5: 创建 Release (仅 tag 推送)
  # ============================================
  release:
    name: 创建 Release
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 打包
        run: |
          cd dist
          zip -r ../hao430-resume-${{ github.ref_name }}.zip .
          cd ..

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hao430-resume-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## 部署信息
            - 🌐 前端: https://hao430.cn
            - 🖥️ 后端 API: https://hao430.cn/api
            - 📦 构建产物: hao430-resume-${{ github.ref_name }}.zip
            - 🔧 Node: ${{ env.NODE_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Job 6: 部署通知
  # ============================================
  notify:
    name: 部署通知
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 部署状态
        run: |
          echo "========================================="
          echo "  部署报告 - $(date)"
          echo "========================================="
          echo "  前端 (ESA): ${{ needs.deploy-frontend.result == 'success' && '✅' || '❌' }}"
          echo "  后端 (PM2): ${{ needs.deploy-backend.result == 'success' && '✅' || '❌' }}"
          echo "========================================="
