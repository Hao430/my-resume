name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-check:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Lint 检查
        run: pnpm run lint

      - name: TypeScript 类型检查
        run: pnpm run type-check

      - name: 生产构建验证
        run: pnpm run build-only

      - name: 构建完成通知
        if: success() && github.ref == 'refs/heads/main'
        run: |
          echo "✅ CI 全部通过，ESA 正在将 main 分支部署到 hao430.cn"
