name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

# 权限配置
permissions:
  contents: read
  actions: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ============================================
  # Job 1: 代码质量检查 (Lint + Type Check)
  # ============================================
  quality-check:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Lint 检查
        run: pnpm run lint

      - name: TypeScript 类型检查
        run: pnpm run type-check

  # ============================================
  # Job 2: 构建测试
  # ============================================
  build-test:
    name: 构建测试
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 生产构建
        run: pnpm run build-only

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ============================================
  # Job 3: 部署到阿里云 ESA (仅 main 分支)
  # ============================================
  deploy:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [quality-check, build-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://hao430.cn

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 生产构建
        run: pnpm run build-only

      - name: 部署到阿里云 ESA
        run: |
          echo "🚀 开始部署到阿里云 ESA..."
          echo "✅ 构建产物已准备就绪"
          echo "📦 部署目录: ./dist"
          echo "🌐 目标域名: https://hao430.cn"
          echo ""
          echo "⚠️ 注意：当前项目使用阿里云 ESA 自动部署功能"
          echo "   推送代码到 main 分支后，ESA 会自动拉取并部署"
          echo "   详细配置请查看 esa.jsonc 文件"

  # ============================================
  # Job 4: 创建 Release (仅 tag 推送)
  # ============================================
  release:
    name: 创建 Release
    runs-on: ubuntu-latest
    needs: [quality-check, build-test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 打包构建产物
        run: |
          cd dist
          zip -r ../hao430-resume-${{ github.ref_name }}.zip .
          cd ..

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hao430-resume-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## 部署信息
            - 🌐 在线预览: https://hao430.cn
            - 📦 构建产物: hao430-resume-${{ github.ref_name }}.zip
            - 🔧 Node 版本: ${{ env.NODE_VERSION }}
            - 📋 包管理器: pnpm ${{ env.PNPM_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Job 5: 通知 (可选)
  # ============================================
  notify:
    name: 发送部署通知
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 部署成功通知
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ 部署成功！"
          echo "🌐 网站地址: https://hao430.cn"
          echo "📅 部署时间: $(date)"
          echo "🔀 分支: ${{ github.ref_name }}"
          echo "🔖 Commit: ${{ github.sha }}"

      - name: 部署失败通知
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ 部署失败！"
          echo "📅 时间: $(date)"
          echo "🔀 分支: ${{ github.ref_name }}"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "请检查 GitHub Actions 日志获取详细错误信息"
