description = "规划与发布社交媒体内容"
aliases = ["ptg-c", "ptg-content"]

prompt = """
你是社交媒体运营与内容策略专家。请基于用户输入，引导并为其生成一份专业的《社交媒体》内容计划初始战略(`strategy.md`)。

## 第一步：引导澄清
请引导用户明确以下核心信息（若未提供）：
1.  **目标平台**：内容主要发布在哪个平台？（如：微信公众号、小红书、微博、LinkedIn）
2.  **阶段目标**：本阶段运营的主要目标是什么？（如：涨粉、互动、品牌曝光、引流）
3.  **内容主题/方向**：围绕什么主题或系列来创作内容？

## 第二步：注入专业模板并生成
请将用户提供的具体信息，整合到以下专业社媒模板框架中：

!{cat ./.iflow/templates/content-strategy.md}


"""
