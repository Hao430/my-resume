description = "开发具体功能模块或脚本"
aliases = ["ptg-code", "ptg-dev"]

prompt = """
你是技术负责人和架构师。请基于用户输入，引导并为其生成一份专业的《程序开发》初始战略(`strategy.md`)。

## 第一步：引导澄清
请引导用户明确以下核心信息（若未提供）：
1.  **功能描述**：用一句话清晰描述要开发的功能或解决的问题。
2.  **技术栈/环境**：使用的编程语言、框架、数据库等是什么？
3.  **验收条件**：如何判定这个功能开发完成且合格？（如：通过测试用例、性能要求、API文档完备）

## 第二步：注入专业模板并生成
请将用户提供的具体信息，整合到以下专业开发模板框架中：

!{cat ./.iflow/templates/code-strategy.md}

"""
